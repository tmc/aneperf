<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>aneperf — ANE Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a; --bg1: #141414; --bg2: #1e1e1e;
  --fg: #c8c8c8; --dim: #666; --border: #2a2a2a;
  --green: #4ec970; --cyan: #56c8d8; --blue: #5b9bd5;
  --yellow: #d4a843; --red: #d45050; --orange: #d88040;
  --mono: 'SF Mono', 'Menlo', 'Consolas', monospace;
}
body { background: var(--bg); color: var(--fg); font-family: var(--mono); font-size: 12px; line-height: 1.4; padding: 10px; max-width: 1280px; margin: 0 auto; }
h1 { font-size: 14px; color: var(--cyan); font-weight: 600; }
h2 { font-size: 12px; font-weight: 600; margin: 0 0 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }

.app-shell { display: grid; gap: 8px; }
.summary-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; align-items: start; }
.detail-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; align-items: start; }
.wide-card { grid-column: 1 / -1; }
.span-2 { grid-column: span 2; }

.header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.header .time { color: var(--dim); font-size: 12px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot.off { background: var(--red); }

.device { display: flex; gap: 14px; flex-wrap: wrap; color: var(--dim); font-size: 11px; margin-bottom: 2px; }
.device .arch { color: var(--fg); font-weight: 600; }
.device .fw-ok { color: var(--green); }
.device .fw-bad { color: var(--red); }
.device-badge { display: inline-flex; align-items: center; gap: 6px; padding: 1px 6px; border: 1px solid var(--border); border-radius: 999px; background: var(--bg1); }
.device-badge strong { color: var(--fg); font-weight: 600; }

.section { background: var(--bg1); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; min-width: 0; }
.summary-card .section { min-height: 124px; }
.detail-card .section { min-height: 132px; }
.wide-card .section { min-height: 168px; }

.power-big { font-size: 22px; font-weight: 700; color: var(--green); }
.power-unit { font-size: 12px; color: var(--dim); margin-left: 4px; }
.metrics-inline { display: flex; flex-wrap: wrap; gap: 8px 12px; margin-top: 4px; font-size: 11px; color: var(--dim); }
.compact-note { font-size: 11px; color: var(--dim); }
.empty-state { color: var(--dim); font-size: 11px; padding-top: 8px; }

.bar-outer { background: var(--bg); border-radius: 3px; height: 14px; position: relative; overflow: hidden; margin: 4px 0; }
.bar-inner { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.bar-label { position: absolute; right: 6px; top: 0; line-height: 14px; font-size: 10px; color: var(--fg); }

.sparkline { margin: 4px 0; }
.sparkline svg { display: block; width: 100%; height: 28px; }

.energy-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 2px 12px; margin-top: 4px; }
.energy-row { display: flex; justify-content: space-between; gap: 8px; font-size: 11px; color: var(--dim); padding: 1px 0; }
.energy-row .val { color: var(--fg); }
.energy-row .watts { color: var(--green); }

.histogram .bar-row { display: flex; align-items: center; gap: 6px; margin: 2px 0; font-size: 11px; }
.histogram .bar-name { width: 40px; text-align: right; color: var(--cyan); }
.histogram .bar-track { flex: 1; background: var(--bg); border-radius: 2px; height: 10px; overflow: hidden; }
.histogram .bar-fill { height: 100%; background: var(--green); opacity: 0.6; border-radius: 2px; transition: width 0.4s ease; }
.histogram .bar-pct { width: 48px; text-align: right; font-size: 11px; color: var(--dim); }

.state-chips { display: flex; flex-wrap: wrap; gap: 4px; margin: 2px 0; }
.state-chip { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--bg); border: 1px solid var(--border); white-space: nowrap; }
.state-chip.dominant { border-color: var(--blue); color: var(--blue); }

.channel-row { display: flex; align-items: baseline; gap: 6px; margin: 2px 0; font-size: 11px; flex-wrap: wrap; }
.channel-name { color: var(--fg); min-width: 110px; }

.counter-table { width: 100%; font-size: 11px; }
.counter-table td { padding: 1px 6px; }
.counter-table td:first-child { color: var(--dim); text-align: left; }
.counter-table td:last-child { color: var(--yellow); }

.throttle-alert { color: var(--yellow); font-weight: 600; }
.hidden { display: none; }

.bw-row { display: flex; gap: 4px; align-items: baseline; margin: 2px 0; font-size: 11px; flex-wrap: wrap; }
.bw-name { min-width: 140px; color: var(--fg); }
.bw-chip { font-size: 11px; color: var(--cyan); }
.bw-pct { color: var(--dim); font-size: 11px; }
.bandwidth-table { display: grid; gap: 3px; }
.bandwidth-head,
.bandwidth-line { display: grid; grid-template-columns: minmax(120px, 1.5fr) 52px minmax(76px, 1fr) 52px 64px; gap: 6px; align-items: center; font-size: 11px; }
.bandwidth-head { color: var(--dim); padding-bottom: 2px; border-bottom: 1px solid var(--border); }
.bandwidth-line { padding: 1px 0; }
.bandwidth-avg { color: var(--cyan); text-align: right; white-space: nowrap; }
.bandwidth-tier { white-space: nowrap; }
.bandwidth-dom { color: var(--fg); white-space: nowrap; }
.scroll-region { max-height: 240px; overflow: auto; padding-right: 4px; }
.bandwidth-scroll { overflow-x: auto; overflow-y: hidden; padding-bottom: 2px; }
.bandwidth-table { min-width: 430px; }

@media (max-width: 900px) {
  .summary-grid,
  .detail-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .wide-card,
  .span-2 { grid-column: span 1; }
  .energy-grid { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .summary-grid,
  .detail-grid { grid-template-columns: 1fr; }
}
</style>
<script type="importmap">
{
  "imports": {
    "preact": "https://esm.sh/preact@10.25.4",
    "preact/hooks": "https://esm.sh/preact@10.25.4/hooks",
    "htm/preact": "https://esm.sh/htm@3.1.1/preact?deps=preact@10.25.4"
  }
}
</script>
</head>
<body>
<div id="app"></div>
<script type="module">
import { html, render } from 'htm/preact';
import { useState, useEffect, useRef } from 'preact/hooks';

const HISTORY_LEN = 60;

function classifyChannels(channels) {
  const c = { energy: [], voltage: [], dcsFloor: [], computeEn: [], gpuStats: [], bandwidth: [], throttle: [], interrupt: [], throttleDetail: [], clusterPower: [] };
  for (const ch of channels || []) {
    switch (ch.group) {
      case 'Energy Model':
        c.energy.push(ch); break;
      case 'Interrupt Statistics (by index)':
        c.interrupt.push(ch); break;
      case 'GPU Stats':
        c.gpuStats.push(ch); break;
      case 'SoC Stats':
        if (ch.subgroup === 'Events') c.throttleDetail.push(ch);
        else if (ch.subgroup === 'Cluster Power States') c.clusterPower.push(ch);
        break;
      default:
        if (!ch.group.startsWith('PMP')) break;
        if (ch.subgroup === 'SOC Floor') c.voltage.push(ch);
        else if (ch.subgroup === 'DCS Floor') c.dcsFloor.push(ch);
        else if (ch.subgroup === 'Fast-Die CE') c.computeEn.push(ch);
        else if (ch.subgroup && ch.subgroup.includes('BW')) c.bandwidth.push(ch);
        else if (ch.subgroup && ch.subgroup.startsWith('PWRS')) c.throttle.push(ch);
        else c.bandwidth.push(ch);
        break;
    }
  }
  return c;
}

function computeActivePctFromCE(channels) {
  for (const ch of channels) {
    if (!ch.states || ch.states.length === 0) continue;
    let totalRes = 0, weightedSum = 0;
    for (const s of ch.states) {
      totalRes += s.residency_ns;
      const name = s.name.trim().replace('%', '');
      const pct = parseFloat(name) || 0;
      weightedSum += pct * s.residency_ns;
    }
    if (totalRes > 0) return weightedSum / totalRes;
  }
  return 0;
}

function computeActivePctFromVoltage(channels) {
  let maxActive = 0;
  for (const ch of channels) {
    if (!ch.states || ch.states.length === 0) continue;
    let total = 0, vminRes = 0, hasVMIN = false;
    for (const s of ch.states) {
      total += s.residency_ns;
      if (s.name.trim() === 'VMIN') { vminRes = s.residency_ns; hasVMIN = true; }
    }
    if (hasVMIN && total > 0) {
      const active = (total - vminRes) / total * 100;
      if (active > maxActive) maxActive = active;
    }
  }
  return maxActive;
}

function computeGPUActivePct(channels) {
  for (const ch of channels || []) {
    if (!ch.states || ch.states.length === 0) continue;
    let total = 0;
    let active = 0;
    for (const s of ch.states) {
      total += s.residency_ns;
      const name = s.name.trim();
      if (name !== 'OFF' && name !== 'IDLE' && name !== 'DOWN') active += s.residency_ns;
    }
    if (total > 0) return active / total * 100;
  }
  return 0;
}

function energyToWatts(value, unit, intervalMs) {
  if (intervalMs <= 0) intervalMs = 1000;
  const rate = value / (intervalMs / 1000);
  switch (unit) {
    case 'mJ': return rate / 1e3;
    case 'uJ': return rate / 1e6;
    case 'nJ': return rate / 1e9;
    default: return rate / 1e6;
  }
}

function parseBandwidthGBps(name) {
  const m = String(name || '').match(/([0-9]+)\s*GB\/s/i);
  return m ? parseFloat(m[1]) : 0;
}

function summarizeBandwidthChannel(ch) {
  let total = 0;
  let weighted = 0;
  let dominantName = '';
  let dominantRes = -1;
  let maxTier = 0;
  let minTier = Infinity;
  let minTierRes = 0;

  for (const s of (ch.states || [])) {
    const res = s.residency_ns || 0;
    const tier = parseBandwidthGBps(s.name);
    total += res;
    weighted += tier * res;
    if (res > dominantRes) {
      dominantRes = res;
      dominantName = s.name.trim();
    }
    if (tier > 0) {
      if (tier > maxTier) maxTier = tier;
      if (tier < minTier) {
        minTier = tier;
        minTierRes = res;
      } else if (tier === minTier) {
        minTierRes += res;
      }
    }
  }

  if (total <= 0 || maxTier <= 0) return null;

  const avgGBps = weighted / total;
  const dominantPct = dominantRes > 0 ? dominantRes / total * 100 : 0;
  return {
    channel: ch.channel,
    avgGBps,
    minTier,
    dominantName,
    dominantPct,
    maxTier,
  };
}

function summarizeClusterPower(channels) {
  for (const ch of channels || []) {
    if (!ch.states || ch.states.length === 0) continue;
    let total = 0;
    let actRes = 0;
    for (const s of ch.states) {
      total += s.residency_ns || 0;
      if (s.name.trim() === 'ACT') actRes = s.residency_ns || 0;
    }
    if (total > 0) return { name: ch.channel, actPct: actRes / total * 100 };
  }
  return null;
}

function App() {
  const [delta, setDelta] = useState(null);
  const [connected, setConnected] = useState(false);
  const [device, setDevice] = useState(null);
  const historyRef = useRef([]);
  const gpuHistoryRef = useRef([]);

  useEffect(() => {
    fetch('/api/device').then(r => r.json()).then(setDevice).catch(() => {});
  }, []);

  useEffect(() => {
    const es = new EventSource('/api/stream');
    es.addEventListener('delta', (e) => {
      const d = JSON.parse(e.data);
      setDelta(d);
      setConnected(true);
      const h = historyRef.current;
      h.push(d.ane_power_watts);
      if (h.length > HISTORY_LEN) h.splice(0, h.length - HISTORY_LEN);
      const gh = gpuHistoryRef.current;
      gh.push(d.gpu_power_watts || 0);
      if (gh.length > HISTORY_LEN) gh.splice(0, gh.length - HISTORY_LEN);
    });
    es.onerror = () => setConnected(false);
    es.onopen = () => setConnected(true);
    return () => es.close();
  }, []);

  if (!delta) {
    return html`<div class="header"><h1>aneperf</h1> <span class="dot ${connected ? 'on' : 'off'}"></span> <span class="time">waiting for data…</span></div>`;
  }

  const cat = classifyChannels(delta.channels);
  const dev = delta.device || device || {};
  const durationMs = delta.duration ? delta.duration / 1e6 : 1000;

  let activePct = computeActivePctFromCE(cat.computeEn);
  if (activePct === 0) activePct = computeActivePctFromVoltage(cat.voltage);
  const gpuActivePct = delta.gpu_active_pct || computeGPUActivePct(cat.gpuStats);
  const clusterSummary = summarizeClusterPower(cat.clusterPower);

  return html`
    <div class="app-shell">
      <${DeviceHeader} dev=${dev} connected=${connected} clusterSummary=${clusterSummary} />
      <div class="summary-grid">
        <div class="summary-card"><${PowerSection} powerW=${delta.ane_power_watts} activePct=${activePct} history=${historyRef.current} energy=${cat.energy} durationMs=${durationMs} compact=${true} /></div>
        <div class="summary-card"><${GPUSection} powerW=${delta.gpu_power_watts || 0} activePct=${gpuActivePct} tempC=${delta.gpu_temp_c || 0} history=${gpuHistoryRef.current} channels=${cat.gpuStats} compact=${true} /></div>
      </div>
      <div class="detail-grid">
        <div class="detail-card"><${ComputeUtilization} channels=${cat.computeEn} /></div>
        <div class="detail-card"><${ANEStatesSection} voltage=${cat.voltage} dcsFloor=${cat.dcsFloor} /></div>
        <div class="detail-card span-2"><${BandwidthSection} channels=${cat.bandwidth} /></div>
        <div class="detail-card"><${ThrottleOverviewSection} throttle=${cat.throttle} throttleDetail=${cat.throttleDetail} durationMs=${durationMs} /></div>
        <div class="wide-card"><${CounterTable} channels=${cat.interrupt} durationMs=${durationMs} /></div>
      </div>
      <${Footer} durationMs=${durationMs} channelCount=${(delta.channels || []).length} />
    </div>
  `;
}

function DeviceHeader({ dev, connected, clusterSummary }) {
  const fwClass = dev.firmware_loaded ? 'fw-ok' : 'fw-bad';
  const fwText = dev.firmware_loaded ? '✓' : '✗';
  const now = new Date().toLocaleTimeString();
  return html`
    <div class="header">
      <h1>aneperf</h1>
      <span class="dot ${connected ? 'on' : 'off'}"></span>
      <span class="time">${now}</span>
    </div>
    <div class="device">
      <span class="arch">${dev.architecture || '—'}</span>
      <span>${dev.num_cores || 0} cores</span>
      <span>v${dev.version || 0}.${dev.minor_version || 0}</span>
      <span>board:${dev.board_type || 0}</span>
      <span>fw:<span class="${fwClass}">${fwText}</span></span>
      <span>pwr:${dev.power_state || 0}/${dev.max_power_state || 0}</span>
      ${clusterSummary ? html`<span class="device-badge"><strong>${clusterSummary.name}</strong> <span style="color:${clusterSummary.actPct >= 50 ? 'var(--green)' : 'var(--yellow)'}">ACT ${clusterSummary.actPct.toFixed(1)}%</span></span>` : null}
    </div>
  `;
}

function powerStats(history) {
  if (!history || history.length === 0) return { min: 0, avg: 0, max: 0 };
  let min = history[0], max = history[0], sum = 0;
  for (const v of history) {
    if (v < min) min = v;
    if (v > max) max = v;
    sum += v;
  }
  return { min, avg: sum / history.length, max };
}

function PowerSection({ powerW, activePct, history, energy, durationMs, compact = false }) {
  const barPct = Math.min(activePct, 100);
  const ps = powerStats(history);
  const efficiency = activePct > 0 ? (powerW / activePct) : null;
  const measuredSec = durationMs / 1000;
  return html`
    <div class="section">
      <h2>Power</h2>
      <div title="ANE power draw in watts, computed from IOReport energy counters divided by sample interval"><span class="power-big">${powerW.toFixed(3)}</span><span class="power-unit">W</span></div>
      <div class="metrics-inline">
        <span>min ${ps.min.toFixed(3)}W</span>
        <span>avg ${ps.avg.toFixed(3)}W</span>
        <span>max ${ps.max.toFixed(3)}W</span>
        ${efficiency !== null ? html`<span>eff ${efficiency.toFixed(4)} W/%</span>` : null}
      </div>
      <div class="compact-note" style="margin-top:6px">ANE Active</div>
      <div class="bar-outer">
        <div class="bar-inner" style="width:${barPct}%;background:var(--green);opacity:0.6"></div>
        <span class="bar-label">${activePct.toFixed(1)}%</span>
      </div>
      <${Sparkline} data=${history} />
      <div class="compact-note">measured ${measuredSec.toFixed(3)}s</div>
      <div class="energy-grid">
      ${energy.map(ch => {
        const watts = ch.value ? energyToWatts(ch.value, ch.unit, durationMs) : 0;
        return html`
          <div class="energy-row">
            <span>${ch.channel}</span>
            <span>${ch.value ? html`<span class="val">${ch.value} ${ch.unit}</span> <span class="watts">(${watts.toFixed(3)}W)</span>` : html`<span>0 ${ch.unit}</span>`}</span>
          </div>
        `;
      })}
      </div>
    </div>
  `;
}

function Sparkline({ data, color = 'var(--green)' }) {
  if (!data || data.length < 2) return null;
  const w = 300, h = 28;
  const max = Math.max(...data, 0.001);
  const points = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - (v / max) * h;
    return `${x},${y}`;
  }).join(' ');
  return html`
    <div class="sparkline">
      <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
        <polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" />
      </svg>
    </div>
  `;
}

function ComputeUtilization({ channels }) {
  if (!channels || channels.length === 0) {
    return html`<div class="section"><h2>Compute Utilization</h2><div class="empty-state">No ANE compute activity.</div></div>`;
  }
  const items = [];
  for (const ch of channels) {
    if (!ch.states || ch.states.length === 0) continue;
    let total = 0, maxRes = 0;
    for (const s of ch.states) { total += s.residency_ns; if (s.residency_ns > maxRes) maxRes = s.residency_ns; }
    if (total === 0) continue;
    const rows = ch.states.filter(s => (s.residency_ns / total * 100) >= 0.5).map(s => ({
      name: s.name.trim(),
      pct: s.residency_ns / total * 100,
      fill: maxRes > 0 ? s.residency_ns / maxRes * 100 : 0,
    }));
    // Find peak bucket and weighted average.
    let peakName = '', peakPct = 0, weightedSum = 0;
    for (const s of ch.states) {
      const pct = s.residency_ns / total * 100;
      if (pct > peakPct) { peakPct = pct; peakName = s.name.trim(); }
      const val = parseFloat(s.name.trim().replace('%', '')) || 0;
      weightedSum += val * s.residency_ns;
    }
    const weightedAvg = weightedSum / total;
    items.push({ channel: ch.channel, rows, peakName, peakPct, weightedAvg });
  }
  if (items.length === 0) {
    return html`<div class="section"><h2>Compute Utilization</h2><div class="empty-state">No ANE compute activity.</div></div>`;
  }
  return html`
    <div class="section">
      <h2 title="Fast-Die CE histogram showing ANE compute utilization distribution. Each bucket shows residency at that utilization level. Weighted average gives overall utilization.">Compute Utilization</h2>
      ${items.map(item => html`
        <div style="color:var(--dim);font-size:11px;margin-bottom:4px">${item.channel}</div>
        <div style="font-size:11px;color:var(--dim);margin-bottom:6px">Peak: ${item.peakName} (${item.peakPct.toFixed(1)}%) · Weighted avg: ${item.weightedAvg.toFixed(1)}%</div>
        <div class="histogram">
          ${item.rows.map(r => html`
            <div class="bar-row">
              <span class="bar-name">${r.name}</span>
              <div class="bar-track"><div class="bar-fill" style="width:${r.fill}%"></div></div>
              <span class="bar-pct">${r.pct.toFixed(1)}%</span>
            </div>
          `)}
        </div>
      `)}
    </div>
  `;
}

function GPUSection({ powerW, activePct, tempC, history, channels, compact = false }) {
  const hasChannels = channels && channels.length > 0;
  if (!hasChannels && powerW <= 0) {
    return html`<div class="section"><h2>GPU</h2><div class="empty-state">No GPU telemetry.</div></div>`;
  }

  const barPct = Math.min(activePct, 100);
  const ps = powerStats(history);
  return html`
    <div class="section">
      <h2>GPU</h2>
      <div title="GPU-related power drawn from IOReport energy counters, including GPU-prefixed domains such as GPU SRAM when available."><span class="power-big" style="color:var(--blue)">${powerW.toFixed(3)}</span><span class="power-unit">W</span></div>
      <div class="metrics-inline">
        <span>min ${ps.min.toFixed(3)}W</span>
        <span>avg ${ps.avg.toFixed(3)}W</span>
        <span>max ${ps.max.toFixed(3)}W</span>
        ${tempC > 0 ? html`<span>thermal ${tempC.toFixed(1)} C</span>` : null}
      </div>
      <div class="compact-note" style="margin-top:6px">GPU Active</div>
      <div class="bar-outer">
        <div class="bar-inner" style="width:${barPct}%;background:var(--blue);opacity:0.6"></div>
        <span class="bar-label">${activePct.toFixed(1)}%</span>
      </div>
      <${Sparkline} data=${history} color="var(--blue)" />
      ${hasChannels ? html`
        ${channels.map(ch => {
          let total = 0;
          for (const s of (ch.states || [])) total += s.residency_ns;
          if (total === 0) return null;
          let dominantName = '', dominantPct = 0;
          const active = [];
          for (const s of ch.states) {
            const pct = s.residency_ns / total * 100;
            const name = s.name.trim();
            if (pct >= 0.5) active.push({ name, pct });
            if (pct > dominantPct) { dominantPct = pct; dominantName = name; }
          }
          return html`
            <div class="channel-row">
              <span class="channel-name">${ch.channel}</span>
              <div class="state-chips">
                ${active.map(s => html`<span class="state-chip ${s.name === dominantName ? 'dominant' : ''}">${s.name} ${Math.round(s.pct)}%</span>`)}
              </div>
            </div>
          `;
        })}
      ` : null}
    </div>
  `;
}

const sectionTooltips = {
  'Voltage States': 'SOC Floor voltage rail residency. VMIN=idle/lowest voltage, VNOM=nominal, VMAX=maximum performance. Non-VMIN residency indicates active ANE compute.',
  'DCS Frequency': 'DCS frequency states. Higher states indicate more ANE memory bandwidth demand.',
};

function renderStateRows(channels) {
  return channels.map(ch => {
    let total = 0;
    for (const s of (ch.states || [])) total += s.residency_ns;
    if (total === 0) return null;
    let dominantName = '', dominantPct = 0;
    const active = [];
    for (const s of ch.states) {
      const pct = s.residency_ns / total * 100;
      const name = s.name.trim();
      if (pct >= 0.5) active.push({ name, pct });
      if (pct > dominantPct) { dominantPct = pct; dominantName = name; }
    }
    return html`
      <div class="channel-row">
        <span class="channel-name">${ch.channel}</span>
        <div class="state-chips">
          ${active.map(s => html`<span class="state-chip ${s.name === dominantName ? 'dominant' : ''}">${s.name} ${Math.round(s.pct)}%</span>`)}
        </div>
      </div>
    `;
  });
}

function hasStateActivity(channels) {
  for (const ch of channels || []) {
    let total = 0;
    for (const s of (ch.states || [])) total += s.residency_ns;
    if (total > 0) return true;
  }
  return false;
}

function ANEStatesSection({ voltage, dcsFloor }) {
  const hasVoltage = hasStateActivity(voltage);
  const hasDCS = hasStateActivity(dcsFloor);
  return html`
    <div class="section" title="Voltage and DCS state residency for the ANE. Voltage shows rail level residency; DCS shows memory-frequency demand states.">
      <h2>ANE States</h2>
      <div class="compact-note" style="margin-bottom:4px">Voltage</div>
      ${hasVoltage ? renderStateRows(voltage) : html`<div class="empty-state" style="padding-top:0;padding-bottom:6px">No recent voltage activity.</div>`}
      <div class="compact-note" style="margin:6px 0 4px;border-top:1px solid var(--border);padding-top:6px">DCS Frequency</div>
      ${hasDCS ? renderStateRows(dcsFloor) : html`<div class="empty-state" style="padding-top:0">No recent DCS activity.</div>`}
    </div>
  `;
}

function StateSection({ title, channels }) {
  if (!channels || channels.length === 0) {
    return html`<div class="section" title="${sectionTooltips[title] || ''}"><h2>${title}</h2><div class="empty-state">No recent state activity.</div></div>`;
  }
  let hasActivity = hasStateActivity(channels);
  if (!hasActivity) {
    return html`<div class="section" title="${sectionTooltips[title] || ''}"><h2>${title}</h2><div class="empty-state">No recent state activity.</div></div>`;
  }

  return html`
    <div class="section" title="${sectionTooltips[title] || ''}">
      <h2>${title}</h2>
      ${renderStateRows(channels)}
    </div>
  `;
}

function BandwidthSection({ channels }) {
  if (!channels || channels.length === 0) {
    return html`<div class="section" title="Bandwidth shows ANE memory bus utilization across AF, DCS, and SOC-NI subsystems. RD=read, WR=write, RD+WR=combined."><h2>Bandwidth</h2><div class="empty-state">No recent bandwidth activity.</div></div>`;
  }
  let hasActivity = false;
  for (const ch of channels) {
    let total = 0;
    for (const s of (ch.states || [])) total += s.residency_ns;
    if (total > 0) { hasActivity = true; break; }
  }
  if (!hasActivity) {
    return html`<div class="section" title="Bandwidth shows ANE memory bus utilization across AF, DCS, and SOC-NI subsystems. RD=read, WR=write, RD+WR=combined."><h2>Bandwidth</h2><div class="empty-state">No recent bandwidth activity.</div></div>`;
  }

  // Group by subgroup.
  const groups = [];
  const seen = {};
  for (const ch of channels) {
    const sg = ch.subgroup || '';
    if (!(sg in seen)) { seen[sg] = groups.length; groups.push({ name: sg, channels: [] }); }
    groups[seen[sg]].channels.push(ch);
  }

  return html`
    <div class="section" title="Bandwidth shows ANE memory bus utilization across AF, DCS, and SOC-NI subsystems. RD=read, WR=write, RD+WR=combined.">
      <h2>Bandwidth</h2>
      <div class="compact-note" style="margin-bottom:4px">tiers detected from live IOReport state labels</div>
      <div class="scroll-region">
      ${groups.map(g => html`
        ${groups.length > 1 && g.name ? html`<div style="font-size:11px;color:var(--dim);margin:6px 0 2px;border-bottom:1px solid var(--border);padding-bottom:2px">${g.name}</div>` : null}
        <div class="bandwidth-scroll">
        <div class="bandwidth-table">
          <div class="bandwidth-head">
            <span>channel</span>
            <span>floor</span>
            <span>dominant</span>
            <span>max</span>
            <span style="text-align:right">avg</span>
          </div>
          ${g.channels
            .map(summarizeBandwidthChannel)
            .filter(Boolean)
            .sort((a, b) => a.channel.localeCompare(b.channel))
            .map(item => html`
              <div class="bandwidth-line">
                <span class="bw-name">${item.channel}</span>
                <span class="bandwidth-tier">${item.minTier.toFixed(0)}GB/s</span>
                <span class="bandwidth-dom">${item.dominantName} <span class="bw-pct">${item.dominantPct.toFixed(0)}%</span></span>
                <span class="bandwidth-tier">${item.maxTier.toFixed(0)}GB/s</span>
                <span class="bandwidth-avg">${item.avgGBps.toFixed(1)}GB/s</span>
              </div>
            `)}
        </div>
        </div>
      `)}
      </div>
    </div>
  `;
}

function ThrottleSection({ channels, durationMs }) {
  if (!channels || channels.length === 0) {
    return html`<div class="section" title="PWRS0 throttle event counters. Each event represents a power management throttle applied to the ANE during the sample interval."><h2>Throttle</h2><div class="empty-state">No throttle events.</div></div>`;
  }
  const active = channels.filter(ch => ch.value > 0);
  if (active.length === 0) {
    return html`<div class="section" title="PWRS0 throttle event counters. Each event represents a power management throttle applied to the ANE during the sample interval."><h2>Throttle</h2><div class="empty-state">No throttle events.</div></div>`;
  }
  let totalThrottles = 0;
  for (const ch of active) totalThrottles += ch.value;
  const durSec = (durationMs || 1000) / 1000;
  const rate = durSec > 0 ? totalThrottles / durSec : 0;
  return html`
    <div class="section" title="PWRS0 throttle event counters. Each event represents a power management throttle applied to the ANE during the sample interval.">
      <h2 class="throttle-alert">Throttle</h2>
      <div style="font-size:11px;color:var(--dim);margin-bottom:6px">Total: ${totalThrottles} events (${rate.toFixed(1)}/s)</div>
      ${active.map(ch => html`
        <div class="energy-row">
          <span>${ch.channel}</span>
          <span class="throttle-alert">${ch.value} ${ch.unit}</span>
        </div>
      `)}
    </div>
  `;
}

function summarizeThrottleDetail(channels) {
  const items = [];
  for (const ch of channels || []) {
    if (!ch.states || ch.states.length === 0) continue;
    let total = 0;
    let actRes = 0;
    for (const s of ch.states) {
      total += s.residency_ns;
      if (s.name.trim() === 'ACT') actRes = s.residency_ns;
    }
    if (total > 0) items.push({ name: ch.channel, actPct: actRes / total * 100 });
  }
  items.sort((a, b) => b.actPct - a.actPct);
  return items;
}

function ThrottleOverviewSection({ throttle, throttleDetail, durationMs }) {
  const activeEvents = (throttle || []).filter(ch => ch.value > 0);
  const detail = summarizeThrottleDetail(throttleDetail);
  const activeDetail = detail.filter(item => item.actPct > 0);
  const durSec = (durationMs || 1000) / 1000;
  let totalThrottles = 0;
  for (const ch of activeEvents) totalThrottles += ch.value;
  const rate = durSec > 0 ? totalThrottles / durSec : 0;

  return html`
    <div class="section" title="Throttle counters and per-reason residency.">
      <h2 style="color:${activeEvents.length > 0 || activeDetail.length > 0 ? 'var(--yellow)' : 'var(--dim)'}">Throttle</h2>
      ${activeEvents.length === 0 && activeDetail.length === 0 ? html`
        <div class="empty-state">No throttle events or active throttle reasons.</div>
      ` : html`
        ${activeEvents.length > 0 ? html`
          <div class="metrics-inline" style="margin-top:0;margin-bottom:6px">
            <span>events ${totalThrottles}</span>
            <span>rate ${rate.toFixed(1)}/s</span>
          </div>
          ${activeEvents.slice(0, 4).map(ch => html`
            <div class="energy-row">
              <span>${ch.channel}</span>
              <span class="throttle-alert">${ch.value} ${ch.unit}</span>
            </div>
          `)}
        ` : html`<div class="empty-state" style="padding-top:0;padding-bottom:6px">No event counters.</div>`}
        <div class="compact-note" style="margin:6px 0 4px;border-top:1px solid var(--border);padding-top:6px">Reason Activity</div>
        ${activeDetail.length > 0 ? activeDetail.slice(0, 6).map(item => html`
          <div class="energy-row">
            <span>${item.name}</span>
            <span class="throttle-alert">ACT ${item.actPct.toFixed(1)}%</span>
          </div>
        `) : html`<div class="empty-state" style="padding-top:0">No active throttle reasons.</div>`}
      `}
    </div>
  `;
}

function ClusterPowerSection({ channels }) {
  if (!channels || channels.length === 0) {
    return html`<div class="section" title="Cluster Power States show whether the ANE cluster is in an active (ACT) or inactive (INACT) power state. High ACT % means the ANE hardware is powered on and available."><h2>Cluster Power</h2><div class="empty-state">No cluster power data.</div></div>`;
  }
  const items = [];
  for (const ch of channels) {
    if (!ch.states || ch.states.length === 0) continue;
    let total = 0, actRes = 0;
    for (const s of ch.states) {
      total += s.residency_ns;
      if (s.name.trim() === 'ACT') actRes = s.residency_ns;
    }
    if (total > 0) items.push({ name: ch.channel, actPct: actRes / total * 100 });
  }
  if (items.length === 0) {
    return html`<div class="section" title="Cluster Power States show whether the ANE cluster is in an active (ACT) or inactive (INACT) power state. High ACT % means the ANE hardware is powered on and available."><h2>Cluster Power</h2><div class="empty-state">No cluster power data.</div></div>`;
  }
  return html`
    <div class="section" title="Cluster Power States show whether the ANE cluster is in an active (ACT) or inactive (INACT) power state. High ACT % means the ANE hardware is powered on and available.">
      <h2>Cluster Power</h2>
      ${items.map(item => html`
        <div style="margin:2px 0">
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">
            <span>${item.name}</span>
            <span style="color:${item.actPct > 50 ? 'var(--green)' : 'var(--yellow)'};font-weight:600">ACT ${item.actPct.toFixed(1)}%</span>
          </div>
          <div class="bar-outer">
            <div class="bar-inner" style="width:${Math.min(item.actPct, 100)}%;background:${item.actPct > 50 ? 'var(--green)' : 'var(--yellow)'};opacity:0.6"></div>
          </div>
        </div>
      `)}
    </div>
  `;
}

function ThrottleDetailSection({ channels }) {
  if (!channels || channels.length === 0) {
    return html`<div class="section" title="Throttle Detail shows which throttling triggers are active. ACT > 0% means the ANE is being throttled for that reason. Known triggers include PPT, ADCLK, DITHR, and EXT."><h2 style="color:var(--dim)">Throttle Detail</h2><div class="empty-state">No throttle detail.</div></div>`;
  }
  const items = [];
  let anyActive = false;
  for (const ch of channels) {
    if (!ch.states || ch.states.length === 0) continue;
    let total = 0, actRes = 0;
    for (const s of ch.states) {
      total += s.residency_ns;
      if (s.name.trim() === 'ACT') actRes = s.residency_ns;
    }
    if (total > 0) {
      const actPct = actRes / total * 100;
      items.push({ name: ch.channel, actPct });
      if (actPct > 0) anyActive = true;
    }
  }
  if (items.length === 0) {
    return html`<div class="section" title="Throttle Detail shows which throttling triggers are active. ACT > 0% means the ANE is being throttled for that reason. Known triggers include PPT, ADCLK, DITHR, and EXT."><h2 style="color:var(--dim)">Throttle Detail</h2><div class="empty-state">No throttle detail.</div></div>`;
  }
  return html`
    <div class="section" title="Throttle Detail shows which throttling triggers are active. ACT > 0% means the ANE is being throttled for that reason. Known triggers include PPT, ADCLK, DITHR, and EXT.">
      <h2 style="color:${anyActive ? 'var(--orange)' : 'var(--dim)'}">Throttle Detail</h2>
      ${!anyActive
        ? html`<div style="font-size:12px;color:var(--dim)">No active throttles</div>`
        : items.map(item => html`
          <div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0;${item.actPct > 0 ? 'color:var(--orange)' : 'color:var(--dim)'}">
            <span>${item.name}</span>
            <span>${item.actPct > 0 ? html`<span style="font-weight:600">ACT ${item.actPct.toFixed(1)}%</span>` : 'INACT 100%'}</span>
          </div>
        `)
      }
    </div>
  `;
}

function CounterTable({ channels, durationMs }) {
  if (!channels || channels.length === 0) {
    return html`<div class="section"><h2>Counters</h2><div class="empty-state">No interrupt counters.</div></div>`;
  }
  const active = channels.filter(ch => Number.isFinite(ch.value) && ch.value !== 0);
  if (active.length === 0) {
    return html`<div class="section"><h2>Counters</h2><div class="empty-state">No interrupt counters.</div></div>`;
  }
  const durSec = (durationMs || 1000) / 1000;

  const countChs = active.filter(ch => !ch.channel.includes('(MATUs)') && !(ch.unit && ch.unit.includes('MATU')));
  const timeChs = active.filter(ch => ch.channel.includes('(MATUs)') || (ch.unit && ch.unit.includes('MATU')));

  return html`
    ${countChs.length > 0 ? html`
      <div class="section" title="Counters show interrupt and handler invocation counts. Handler Count = number of times the ANE interrupt handler ran. Rate (/s) shows frequency.">
        <h2>Counters</h2>
        <div class="scroll-region">
        <table class="counter-table">
          <thead><tr><td style="color:var(--dim)">channel</td><td style="color:var(--dim)">count</td><td style="color:var(--dim)">/s</td></tr></thead>
          <tbody>
            ${countChs.map(ch => {
              const rate = durSec > 0 ? ch.value / durSec : 0;
              return html`<tr><td>${ch.channel}</td><td>${ch.value}</td><td style="color:var(--dim)">${rate.toFixed(1)}</td></tr>`;
            })}
          </tbody>
        </table>
        </div>
      </div>
    ` : null}
    ${timeChs.length > 0 ? html`
      <div class="section" title="Handler Time shows cumulative time spent in interrupt handlers, measured in Mach absolute time units. High values indicate frequent or long-running interrupt handling.">
        <h2 style="color:var(--dim)">Handler Time (MATUs)</h2>
        <div class="scroll-region">
        <table class="counter-table">
          <thead><tr><td style="color:var(--dim)">channel</td><td style="color:var(--dim)">time</td><td style="color:var(--dim)">/s</td></tr></thead>
          <tbody>
            ${timeChs.map(ch => {
              const rate = durSec > 0 ? ch.value / durSec : 0;
              return html`<tr style="color:var(--dim)"><td>${ch.channel}</td><td>${ch.value}</td><td>${rate.toFixed(1)}</td></tr>`;
            })}
          </tbody>
        </table>
        </div>
      </div>
    ` : null}
  `;
}

function Footer({ durationMs, channelCount }) {
  const measuredSec = (durationMs / 1000).toFixed(3);
  const now = new Date().toLocaleString();
  return html`
    <div style="margin-top:16px;font-size:11px;color:var(--dim);text-align:center">
      Sample: ${measuredSec}s measured · ${channelCount} channels · ${now}
    </div>
  `;
}

render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
