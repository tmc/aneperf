<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>aneperf — ANE Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a; --bg1: #141414; --bg2: #1e1e1e;
  --fg: #c8c8c8; --dim: #666; --border: #2a2a2a;
  --green: #4ec970; --cyan: #56c8d8; --blue: #5b9bd5;
  --yellow: #d4a843; --red: #d45050; --orange: #d88040;
  --mono: 'SF Mono', 'Menlo', 'Consolas', monospace;
}
body {
  background:
    radial-gradient(circle at top left, rgba(86, 200, 216, 0.06), transparent 24%),
    radial-gradient(circle at top right, rgba(91, 155, 213, 0.06), transparent 22%),
    var(--bg);
  color: var(--fg);
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.4;
  padding: 14px;
  max-width: 1360px;
  margin: 0 auto;
  font-variant-numeric: tabular-nums;
}
h1 { font-size: 14px; color: var(--cyan); font-weight: 600; }
h2 { font-size: 12px; font-weight: 600; margin: 0 0 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }

.app-shell { display: grid; gap: 12px; }
.summary-grid { display: grid; grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr); gap: 12px; align-items: start; }
.detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 12px; align-items: start; }
.wide-card { grid-column: 1 / -1; }
.span-2 { grid-column: span 2; }

.header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.header .time { color: var(--dim); font-size: 12px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot.off { background: var(--red); }

.device { display: flex; gap: 8px; flex-wrap: wrap; color: var(--dim); font-size: 11px; margin-bottom: 2px; }
.device > span,
.device-badge { padding: 2px 8px; border: 1px solid var(--border); border-radius: 999px; background: rgba(255,255,255,0.02); }
.device .arch { color: var(--fg); font-weight: 600; }
.device .fw-ok { color: var(--green); }
.device .fw-bad { color: var(--red); }
.device-badge { display: inline-flex; align-items: center; gap: 6px; }
.device-badge strong { color: var(--fg); font-weight: 600; }

.section {
  background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 44%), var(--bg1);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  min-width: 0;
  min-height: 60px;
}

.power-big { font-size: 22px; font-weight: 700; color: var(--green); font-variant-numeric: tabular-nums; }
.power-unit { font-size: 12px; color: var(--dim); margin-left: 4px; }
.metrics-inline { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; font-size: 11px; color: var(--dim); }
.metric-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 8px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.025);
}
.compact-note { font-size: 11px; color: var(--dim); }
.empty-state { color: var(--dim); font-size: 11px; padding-top: 4px; }
.section-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
.section-kicker { color: var(--dim); font-size: 11px; }
.section-status { color: var(--dim); font-size: 10px; border: 1px solid var(--border); border-radius: 999px; padding: 2px 8px; }
.section-status.live { color: var(--green); }

.bar-outer { background: var(--bg); border-radius: 3px; height: 14px; position: relative; overflow: hidden; margin: 4px 0; }
.bar-inner { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.bar-label { position: absolute; right: 6px; top: 0; line-height: 14px; font-size: 10px; color: var(--fg); }

.sparkline { margin: 4px 0; min-height: 28px; }
.sparkline svg { display: block; width: 100%; height: 28px; }
.sparkline-empty { min-height: 28px; display: flex; align-items: center; color: var(--dim); font-size: 11px; }

.energy-grid { display: grid; gap: 4px; margin-top: 8px; }
.energy-row { display: flex; justify-content: space-between; gap: 8px; font-size: 11px; color: var(--dim); padding: 1px 0; }
.energy-row .val { color: var(--fg); }
.energy-row .watts { color: var(--green); }

.histogram .bar-row { display: flex; align-items: center; gap: 6px; margin: 2px 0; font-size: 11px; }
.histogram .bar-name { width: 40px; text-align: right; color: var(--cyan); }
.histogram .bar-track { flex: 1; background: var(--bg); border-radius: 2px; height: 10px; overflow: hidden; }
.histogram .bar-fill { height: 100%; background: var(--green); opacity: 0.6; border-radius: 2px; transition: width 0.4s ease; }
.histogram .bar-pct { width: 48px; text-align: right; font-size: 11px; color: var(--dim); }

.state-chips { display: flex; flex-wrap: wrap; gap: 4px; margin: 2px 0; }
.state-chip { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--bg); border: 1px solid var(--border); white-space: nowrap; }
.state-chip.dominant { border-color: var(--blue); color: var(--blue); }

.channel-row { display: flex; align-items: baseline; gap: 6px; margin: 2px 0; font-size: 11px; flex-wrap: wrap; }
.channel-name { color: var(--fg); min-width: 110px; }

.counter-table { width: 100%; font-size: 11px; table-layout: fixed; }
.counter-table td, .counter-table th { padding: 1px 6px; }
.counter-table td:first-child { color: var(--dim); text-align: left; }
.counter-table td:last-child { color: var(--yellow); }

.throttle-alert { color: var(--yellow); font-weight: 600; }
.hidden { display: none; }

.bw-row { display: flex; gap: 4px; align-items: baseline; margin: 2px 0; font-size: 11px; flex-wrap: wrap; }
.bw-name { min-width: 140px; color: var(--fg); }
.bw-chip { font-size: 11px; color: var(--cyan); }
.bw-pct { color: var(--dim); font-size: 11px; }
.bandwidth-table { display: grid; gap: 3px; }
.bandwidth-head,
.bandwidth-line { display: grid; grid-template-columns: minmax(120px, 1.5fr) 52px minmax(76px, 1fr) 52px 64px; gap: 6px; align-items: center; font-size: 11px; }
.bandwidth-head { color: var(--dim); padding-bottom: 2px; border-bottom: 1px solid var(--border); }
.bandwidth-line { padding: 1px 0; }
.bandwidth-avg { color: var(--cyan); text-align: right; white-space: nowrap; min-width: 72px; }
.bandwidth-tier { white-space: nowrap; }
.bandwidth-dom { color: var(--fg); white-space: nowrap; }
.scroll-region { max-height: 240px; overflow: auto; padding-right: 4px; }
.bandwidth-grid { display: grid; gap: 6px; }
.bandwidth-item {
  display: grid;
  grid-template-columns: minmax(88px, 110px) minmax(0, 1fr) auto;
  gap: 8px;
  align-items: baseline;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.bandwidth-item:last-child { border-bottom: 0; padding-bottom: 0; }
.bandwidth-group { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
.bandwidth-desc { min-width: 0; }
.bandwidth-name { color: var(--fg); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bandwidth-meta { color: var(--dim); font-size: 10px; margin-top: 1px; }
.bandwidth-avg { color: var(--cyan); font-size: 12px; white-space: nowrap; }

@media (max-width: 900px) {
  .summary-grid,
  .detail-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .summary-grid { grid-template-columns: 1fr; }
  .wide-card,
  .span-2 { grid-column: span 1; }
}
@media (max-width: 640px) {
  .summary-grid,
  .detail-grid { grid-template-columns: 1fr; }
  body { padding: 10px; }
}
</style>
<script type="importmap">
{
  "imports": {
    "preact": "https://esm.sh/preact@10.25.4",
    "preact/hooks": "https://esm.sh/preact@10.25.4/hooks",
    "htm/preact": "https://esm.sh/htm@3.1.1/preact?deps=preact@10.25.4"
  }
}
</script>
</head>
<body>
<div id="app"></div>
<script type="module">
import { html, render } from 'htm/preact';
import { useState, useEffect, useRef } from 'preact/hooks';

const HISTORY_LEN = 60;

function classifyChannels(channels) {
  const c = { energy: [], voltage: [], dcsFloor: [], computeEn: [], gpuStats: [], bandwidth: [], throttle: [], interrupt: [], throttleDetail: [], clusterPower: [] };
  for (const ch of channels || []) {
    switch (ch.group) {
      case 'Energy Model':
        c.energy.push(ch); break;
      case 'Interrupt Statistics (by index)':
        c.interrupt.push(ch); break;
      case 'GPU Stats':
        c.gpuStats.push(ch); break;
      case 'SoC Stats':
        if (ch.subgroup === 'Events') c.throttleDetail.push(ch);
        else if (ch.subgroup === 'Cluster Power States') c.clusterPower.push(ch);
        break;
      default:
        if (!ch.group.startsWith('PMP')) break;
        if (ch.subgroup === 'SOC Floor') c.voltage.push(ch);
        else if (ch.subgroup === 'DCS Floor') c.dcsFloor.push(ch);
        else if (ch.subgroup === 'Fast-Die CE') c.computeEn.push(ch);
        else if (ch.subgroup && ch.subgroup.includes('BW')) c.bandwidth.push(ch);
        else if (ch.subgroup && ch.subgroup.startsWith('PWRS')) c.throttle.push(ch);
        else c.bandwidth.push(ch);
        break;
    }
  }
  return c;
}

function computeActivePctFromCE(channels) {
  for (const ch of channels) {
    if (!ch.states || ch.states.length === 0) continue;
    let totalRes = 0, weightedSum = 0;
    for (const s of ch.states) {
      totalRes += s.residency_ns;
      const name = s.name.trim().replace('%', '');
      const pct = parseFloat(name) || 0;
      weightedSum += pct * s.residency_ns;
    }
    if (totalRes > 0) return weightedSum / totalRes;
  }
  return 0;
}

function computeActivePctFromVoltage(channels) {
  let maxActive = 0;
  for (const ch of channels) {
    if (!ch.states || ch.states.length === 0) continue;
    let total = 0, vminRes = 0, hasVMIN = false;
    for (const s of ch.states) {
      total += s.residency_ns;
      if (s.name.trim() === 'VMIN') { vminRes = s.residency_ns; hasVMIN = true; }
    }
    if (hasVMIN && total > 0) {
      const active = (total - vminRes) / total * 100;
      if (active > maxActive) maxActive = active;
    }
  }
  return maxActive;
}

function computeGPUActivePct(channels) {
  for (const ch of channels || []) {
    if (!ch.states || ch.states.length === 0) continue;
    let total = 0;
    let active = 0;
    for (const s of ch.states) {
      total += s.residency_ns;
      const name = s.name.trim();
      if (name !== 'OFF' && name !== 'IDLE' && name !== 'DOWN') active += s.residency_ns;
    }
    if (total > 0) return active / total * 100;
  }
  return 0;
}

function energyToWatts(value, unit, intervalMs) {
  if (intervalMs <= 0) intervalMs = 1000;
  const rate = value / (intervalMs / 1000);
  switch (unit) {
    case 'mJ': return rate / 1e3;
    case 'uJ': return rate / 1e6;
    case 'nJ': return rate / 1e9;
    default: return rate / 1e6;
  }
}

function isANEEnergyChannel(name) {
  return /(^|[^A-Za-z])ANE/i.test(String(name || ''));
}

function isGPUEnergyChannel(name) {
  return String(name || '').trim().startsWith('GPU');
}

function summarizeEnergyRows(channels, intervalMs, predicate) {
  return (channels || [])
    .filter(ch => predicate(ch.channel))
    .map(ch => ({
      name: ch.channel,
      unit: ch.unit || '',
      value: ch.value || 0,
      watts: ch.value ? energyToWatts(ch.value, ch.unit, intervalMs) : 0,
    }))
    .filter(row => row.value > 0)
    .sort((a, b) => b.watts - a.watts || a.name.localeCompare(b.name));
}

function hasHistorySignal(history) {
  return (history || []).some(v => v > 0.001);
}

function summarizeStates(ch) {
  let total = 0;
  for (const s of (ch.states || [])) total += s.residency_ns || 0;
  if (total <= 0) return null;
  let dominantName = '';
  let dominantPct = 0;
  const active = [];
  for (const s of ch.states || []) {
    const pct = (s.residency_ns || 0) / total * 100;
    const name = s.name.trim();
    if (pct >= 0.5) active.push({ name, pct });
    if (pct > dominantPct) {
      dominantPct = pct;
      dominantName = name;
    }
  }
  active.sort((a, b) => b.pct - a.pct || a.name.localeCompare(b.name));
  return { channel: ch.channel, total, dominantName, dominantPct, active };
}

function parseBandwidthGBps(name) {
  const m = String(name || '').match(/([0-9]+)\s*GB\/s/i);
  return m ? parseFloat(m[1]) : 0;
}

function summarizeBandwidthChannel(ch) {
  let total = 0;
  let weighted = 0;
  let dominantName = '';
  let dominantRes = -1;
  let maxTier = 0;
  let minTier = Infinity;

  for (const s of (ch.states || [])) {
    const res = s.residency_ns || 0;
    const tier = parseBandwidthGBps(s.name);
    total += res;
    weighted += tier * res;
    if (res > dominantRes) {
      dominantRes = res;
      dominantName = s.name.trim();
    }
    if (tier > 0) {
      if (tier > maxTier) maxTier = tier;
      if (tier < minTier) {
        minTier = tier;
      }
    }
  }

  if (total <= 0 || maxTier <= 0) return null;

  const avgGBps = weighted / total;
  const dominantPct = dominantRes > 0 ? dominantRes / total * 100 : 0;
  return {
    channel: ch.channel,
    avgGBps,
    minTier,
    dominantName,
    dominantPct,
    maxTier,
    subgroup: ch.subgroup || '',
  };
}

function summarizeClusterPower(channels) {
  for (const ch of channels || []) {
    if (!ch.states || ch.states.length === 0) continue;
    let total = 0;
    let actRes = 0;
    for (const s of ch.states) {
      total += s.residency_ns || 0;
      if (s.name.trim() === 'ACT') actRes = s.residency_ns || 0;
    }
    if (total > 0) return { name: ch.channel, actPct: actRes / total * 100 };
  }
  return null;
}

function App() {
  const [delta, setDelta] = useState(null);
  const [connected, setConnected] = useState(false);
  const [device, setDevice] = useState(null);
  const historyRef = useRef([]);
  const gpuHistoryRef = useRef([]);
  const bwHistoryRef = useRef({});
  const voltageHistoryRef = useRef({});
  const counterHistoryRef = useRef({});
  const handlerTimeHistoryRef = useRef({});
  const throttleHistoryRef = useRef([]);

  useEffect(() => {
    fetch('/api/device').then(r => r.json()).then(setDevice).catch(() => {});
  }, []);

  useEffect(() => {
    const es = new EventSource('/api/stream');
    es.addEventListener('delta', (e) => {
      const d = JSON.parse(e.data);
      setDelta(d);
      setConnected(true);
      const h = historyRef.current;
      h.push(d.ane_power_watts);
      if (h.length > HISTORY_LEN) h.splice(0, h.length - HISTORY_LEN);
      const gh = gpuHistoryRef.current;
      gh.push(d.gpu_power_watts || 0);
      if (gh.length > HISTORY_LEN) gh.splice(0, gh.length - HISTORY_LEN);

      // Track per-channel histories for bandwidth, voltage, counters, handler time, throttle.
      // Always record (even zero) so past activity remains visible when idle.
      const cat = classifyChannels(d.channels);
      const durSec = d.duration ? d.duration / 1e6 / 1000 : 1;

      function pushHistory(ref, key, val) {
        if (!ref[key]) ref[key] = [];
        ref[key].push(val);
        if (ref[key].length > HISTORY_LEN) ref[key].splice(0, ref[key].length - HISTORY_LEN);
      }

      // Bandwidth: per-channel avgGBps (0 when idle)
      for (const ch of cat.bandwidth || []) {
        const summary = summarizeBandwidthChannel(ch);
        pushHistory(bwHistoryRef.current, ch.channel, summary ? summary.avgGBps : 0);
      }

      // Voltage: per-channel non-VMIN active%
      for (const ch of cat.voltage || []) {
        if (!ch.states || ch.states.length === 0) continue;
        let total = 0, vminRes = 0;
        for (const s of ch.states) {
          total += s.residency_ns;
          if (s.name.trim() === 'VMIN') vminRes = s.residency_ns;
        }
        const activePct = total > 0 ? (total - vminRes) / total * 100 : 0;
        pushHistory(voltageHistoryRef.current, ch.channel, activePct);
      }

      // Interrupt counters and handler time: always record all channels (0 when idle)
      for (const ch of cat.interrupt || []) {
        const isTime = ch.channel.includes('(MATUs)') || (ch.unit && ch.unit.includes('MATU'));
        const val = Number.isFinite(ch.value) && ch.value > 0 ? ch.value : 0;
        const rate = durSec > 0 ? val / durSec : 0;
        if (isTime) {
          pushHistory(handlerTimeHistoryRef.current, ch.channel, rate);
        } else {
          pushHistory(counterHistoryRef.current, ch.channel, rate);
        }
      }

      // Throttle: total rate/s
      let totalThrottles = 0;
      for (const ch of cat.throttle || []) if (ch.value > 0) totalThrottles += ch.value;
      const throttleRate = durSec > 0 ? totalThrottles / durSec : 0;
      const th = throttleHistoryRef.current;
      th.push(throttleRate);
      if (th.length > HISTORY_LEN) th.splice(0, th.length - HISTORY_LEN);
    });
    es.onerror = () => setConnected(false);
    es.onopen = () => setConnected(true);
    return () => es.close();
  }, []);

  if (!delta) {
    return html`<div class="header"><h1>aneperf</h1> <span class="dot ${connected ? 'on' : 'off'}"></span> <span class="time">waiting for data…</span></div>`;
  }

  const cat = classifyChannels(delta.channels);
  const dev = delta.device || device || {};
  const durationMs = delta.duration ? delta.duration / 1e6 : 1000;

  let activePct = computeActivePctFromCE(cat.computeEn);
  if (activePct === 0) activePct = computeActivePctFromVoltage(cat.voltage);
  const gpuActivePct = delta.gpu_active_pct || computeGPUActivePct(cat.gpuStats);
  const clusterSummary = summarizeClusterPower(cat.clusterPower);
  const aneEnergy = summarizeEnergyRows(cat.energy, durationMs, isANEEnergyChannel);
  const gpuEnergy = summarizeEnergyRows(cat.energy, durationMs, isGPUEnergyChannel);

  return html`
    <div class="app-shell">
      <${DeviceHeader} dev=${dev} connected=${connected} clusterSummary=${clusterSummary} />
      <div class="summary-grid">
        <div class="summary-card"><${PowerSection} powerW=${delta.ane_power_watts} activePct=${activePct} history=${historyRef.current} energyRows=${aneEnergy} durationMs=${durationMs} /></div>
        ${cat.gpuStats.length > 0 || delta.gpu_power_watts > 0 || gpuEnergy.length > 0 ? html`<div class="summary-card"><${GPUSection} powerW=${delta.gpu_power_watts || 0} activePct=${gpuActivePct} tempC=${delta.gpu_temp_c || 0} history=${gpuHistoryRef.current} channels=${cat.gpuStats} energyRows=${gpuEnergy} /></div>` : null}
      </div>
      <div class="detail-grid">
        <${ComputeUtilization} channels=${cat.computeEn} />
        <${ANEStatesSection} voltage=${cat.voltage} dcsFloor=${cat.dcsFloor} voltageHistory=${voltageHistoryRef.current} />
        <${BandwidthSection} channels=${cat.bandwidth} bwHistory=${bwHistoryRef.current} />
        <${ThrottleOverviewSection} throttle=${cat.throttle} throttleDetail=${cat.throttleDetail} durationMs=${durationMs} throttleHistory=${throttleHistoryRef.current} />
        <${CounterTable} channels=${cat.interrupt} durationMs=${durationMs} counterHistory=${counterHistoryRef.current} handlerTimeHistory=${handlerTimeHistoryRef.current} />
      </div>
      <${Footer} durationMs=${durationMs} channelCount=${(delta.channels || []).length} />
    </div>
  `;
}

function DeviceHeader({ dev, connected, clusterSummary }) {
  const fwClass = dev.firmware_loaded ? 'fw-ok' : 'fw-bad';
  const fwText = dev.firmware_loaded ? '✓' : '✗';
  const now = new Date().toLocaleTimeString();
  return html`
    <div class="header">
      <h1>aneperf</h1>
      <span class="dot ${connected ? 'on' : 'off'}"></span>
      <span class="time">${now}</span>
    </div>
    <div class="device">
      <span class="arch">${dev.architecture || '—'}</span>
      <span>${dev.num_cores || 0} cores</span>
      <span>v${dev.version || 0}.${dev.minor_version || 0}</span>
      <span>board:${dev.board_type || 0}</span>
      <span>fw:<span class="${fwClass}">${fwText}</span></span>
      <span>pwr:${dev.power_state || 0}/${dev.max_power_state || 0}</span>
      ${clusterSummary ? html`<span class="device-badge"><strong>${clusterSummary.name}</strong> <span style="color:${clusterSummary.actPct >= 50 ? 'var(--green)' : 'var(--yellow)'}">ACT ${clusterSummary.actPct.toFixed(1)}%</span></span>` : null}
    </div>
  `;
}

function powerStats(history) {
  if (!history || history.length === 0) return { min: 0, avg: 0, max: 0 };
  let min = history[0], max = history[0], sum = 0;
  for (const v of history) {
    if (v < min) min = v;
    if (v > max) max = v;
    sum += v;
  }
  return { min, avg: sum / history.length, max };
}

function PowerSection({ powerW, activePct, history, energyRows, durationMs }) {
  const barPct = Math.min(activePct, 100);
  const ps = powerStats(history);
  const efficiency = activePct > 0 ? (powerW / activePct) : null;
  const measuredSec = durationMs / 1000;
  const activeNow = powerW > 0.05 || activePct > 1;
  return html`
    <div class="section">
      <div class="section-head">
        <div>
          <h2>ANE</h2>
          <div class="section-kicker">Neural engine draw and activity</div>
        </div>
        <span class="section-status ${activeNow ? 'live' : ''}">${activeNow ? 'live sample' : 'idle sample'}</span>
      </div>
      <div title="ANE power draw in watts, computed from IOReport energy counters divided by sample interval"><span class="power-big">${powerW.toFixed(3)}</span><span class="power-unit">W</span></div>
      <div class="metrics-inline">
        <span class="metric-chip">min ${ps.min.toFixed(3)}W</span>
        <span class="metric-chip">avg ${ps.avg.toFixed(3)}W</span>
        <span class="metric-chip">max ${ps.max.toFixed(3)}W</span>
        <span class="metric-chip">window ${measuredSec.toFixed(3)}s</span>
        ${efficiency !== null ? html`<span class="metric-chip">eff ${efficiency.toFixed(4)} W/%</span>` : null}
      </div>
      <div class="compact-note" style="margin-top:6px">ANE Active</div>
      <div class="bar-outer">

function Sparkline({ data, color = 'var(--green)', emptyLabel = 'No recent activity.' }) {
  if (!data || data.length < 2) return html`<div class="sparkline-empty">${emptyLabel}</div>`;
  const w = 300, h = 28;
  const max = Math.max(...data, 0);
  if (max <= 0.001) return html`<div class="sparkline-empty">${emptyLabel}</div>`;
  const points = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - (v / max) * h;
    return `${x},${y}`;
  }).join(' ');
  return html`
    <div class="sparkline">
      <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
        <polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" />
      </svg>
    </div>
  `;
}

function ComputeUtilization({ channels }) {
  const items = [];
  for (const ch of (channels || [])) {
    if (!ch.states || ch.states.length === 0) continue;
    let total = 0, maxRes = 0;
    for (const s of ch.states) { total += s.residency_ns; if (s.residency_ns > maxRes) maxRes = s.residency_ns; }
    if (total === 0) continue;
    const rows = ch.states.filter(s => (s.residency_ns / total * 100) >= 0.5).map(s => ({
      name: s.name.trim(),
      pct: s.residency_ns / total * 100,
      fill: maxRes > 0 ? s.residency_ns / maxRes * 100 : 0,
    }));
    // Find peak bucket and weighted average.
    let peakName = '', peakPct = 0, weightedSum = 0;
    for (const s of ch.states) {
      const pct = s.residency_ns / total * 100;
      if (pct > peakPct) { peakPct = pct; peakName = s.name.trim(); }
      const val = parseFloat(s.name.trim().replace('%', '')) || 0;
      weightedSum += val * s.residency_ns;
    }
    const weightedAvg = weightedSum / total;
    items.push({ channel: ch.channel, rows, peakName, peakPct, weightedAvg });
  }
  return html`
    <div class="detail-card">
    <div class="section">
      <h2 title="Fast-Die CE histogram showing ANE compute utilization distribution. Each bucket shows residency at that utilization level. Weighted average gives overall utilization.">Compute Utilization</h2>
      ${items.length > 0 ? items.map(item => html`
        <div style="color:var(--dim);font-size:11px;margin-bottom:4px">${item.channel}</div>
        <div style="font-size:11px;color:var(--dim);margin-bottom:6px">Peak: ${item.peakName} (${item.peakPct.toFixed(1)}%) · Weighted avg: ${item.weightedAvg.toFixed(1)}%</div>
        <div class="histogram">
          ${item.rows.map(r => html`
            <div class="bar-row">
              <span class="bar-name">${r.name}</span>
              <div class="bar-track"><div class="bar-fill" style="width:${r.fill}%"></div></div>
              <span class="bar-pct">${r.pct.toFixed(1)}%</span>
            </div>
          `)}
        </div>
      `) : html`<div class="empty-state">No compute utilization data.</div>`}
    </div>
    </div>
  `;
}

function hasStateActivity(channels) {
  for (const ch of channels || []) {

}

function MiniSparkline({ data, color = 'var(--cyan)', height = 20 }) {
  if (!data || data.length < 2) return null;

  if (max <= 0.001) return null;
  const points = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - (v / max) * h;
    return `${x},${y}`;
  }).join(' ');
  return html`
    <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:inline-block;vertical-align:middle">
      <polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.2" stroke-linejoin="round" />

  `;
}

function summarizeThrottleDetail(channels) {
  const items = [];
  for (const ch of channels || []) {

    for (const s of ch.states) {

      if (s.name.trim() === 'ACT') actRes = s.residency_ns;

    if (total > 0) items.push({ name: ch.channel, actPct: actRes / total * 100 });

  items.sort((a, b) => b.actPct - a.actPct);
  return items;
}

function CounterTable({ channels, durationMs, counterHistory, handlerTimeHistory }) {
  if (!channels || channels.length === 0) {
    return null;

  const durSec = (durationMs || 1000) / 1000;

  // Show channels that are active now OR have historical signal.
  const allCountChs = (channels || []).filter(ch => !ch.channel.includes('(MATUs)') && !(ch.unit && ch.unit.includes('MATU')));
  const allTimeChs = (channels || []).filter(ch => ch.channel.includes('(MATUs)') || (ch.unit && ch.unit.includes('MATU')));
  const countChs = allCountChs.filter(ch => (Number.isFinite(ch.value) && ch.value !== 0) || (counterHistory && counterHistory[ch.channel] && hasHistorySignal(counterHistory[ch.channel])));
  const timeChs = allTimeChs.filter(ch => (Number.isFinite(ch.value) && ch.value !== 0) || (handlerTimeHistory && handlerTimeHistory[ch.channel] && hasHistorySignal(handlerTimeHistory[ch.channel])));
  // Always show the section.

  return html`
    <div class="wide-card">
    <div class="section" title="Counters show interrupt and handler invocation counts. Handler Count = number of times the ANE interrupt handler ran. Rate (/s) shows frequency.">
      <h2>Counters</h2>
    ${countChs.length > 0 ? html`
        <div class="scroll-region">
        <table class="counter-table">
          <thead><tr><td style="color:var(--dim)">channel</td><td style="color:var(--dim)">count</td><td style="color:var(--dim)">/s</td><td style="color:var(--dim)">trend</td><td style="color:var(--dim)">min</td><td style="color:var(--dim)">avg</td><td style="color:var(--dim)">max</td></tr></thead>
          <tbody>
            ${countChs.map(ch => {
              const val = Number.isFinite(ch.value) && ch.value > 0 ? ch.value : 0;
              const rate = durSec > 0 ? val / durSec : 0;
              const hist = counterHistory && counterHistory[ch.channel];
              const stats = hist ? powerStats(hist) : null;
              return html`<tr key=${ch.channel}><td>${ch.channel}</td><td>${val}</td><td style="color:var(--dim)">${rate.toFixed(1)}</td><td>${hist && hist.length >= 2 ? html`<${MiniSparkline} data=${hist} color="var(--yellow)" height=${14} />` : null}</td><td style="color:var(--dim)">${stats ? stats.min.toFixed(1) : ''}</td><td style="color:var(--dim)">${stats ? stats.avg.toFixed(1) : ''}</td><td style="color:var(--dim)">${stats ? stats.max.toFixed(1) : ''}</td></tr>`;
            })}
          </tbody>
        </table>
        </div>
    ` : html`<div class="empty-state">No counter data.</div>`}
    </div>
    <div class="section" title="Handler Time shows cumulative time spent in interrupt handlers, measured in Mach absolute time units. High values indicate frequent or long-running interrupt handling.">
      <h2 style="color:var(--dim)">Handler Time (MATUs)</h2>
    ${timeChs.length > 0 ? html`
        <div class="scroll-region">
        <table class="counter-table">
          <thead><tr><td style="color:var(--dim)">channel</td><td style="color:var(--dim)">time</td><td style="color:var(--dim)">/s</td><td style="color:var(--dim)">trend</td><td style="color:var(--dim)">min</td><td style="color:var(--dim)">avg</td><td style="color:var(--dim)">max</td></tr></thead>
          <tbody>
            ${timeChs.map(ch => {
              const val = Number.isFinite(ch.value) && ch.value > 0 ? ch.value : 0;
              const rate = durSec > 0 ? val / durSec : 0;
              const hist = handlerTimeHistory && handlerTimeHistory[ch.channel];
              const stats = hist ? powerStats(hist) : null;
              return html`<tr key=${ch.channel} style="color:var(--dim)"><td>${ch.channel}</td><td>${val}</td><td>${rate.toFixed(1)}</td><td>${hist && hist.length >= 2 ? html`<${MiniSparkline} data=${hist} color="var(--orange)" height=${14} />` : null}</td><td>${stats ? stats.min.toFixed(1) : ''}</td><td>${stats ? stats.avg.toFixed(1) : ''}</td><td>${stats ? stats.max.toFixed(1) : ''}</td></tr>`;
            })}
          </tbody>
        </table>
        </div>
    ` : html`<div class="empty-state">No handler time data.</div>`}
    </div>
    </div>
  `;
}

function Footer({ durationMs, channelCount }) {
  const measuredSec = (durationMs / 1000).toFixed(3);
  const now = new Date().toLocaleString();
  return html`
    <div style="margin-top:16px;font-size:11px;color:var(--dim);text-align:center">
      Sample: ${measuredSec}s measured · ${channelCount} channels · ${now}
    </div>
  `;
}

render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
